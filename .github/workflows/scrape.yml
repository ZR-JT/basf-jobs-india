name: Scrape BASF Jobs India
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Abhaengigkeiten installieren
        run: |
          pip install playwright aiohttp
          playwright install chromium
          playwright install-deps chromium
      - name: Scraper ausfuehren
        run: |
          python scraper.py
          python events_scraper.py
      - name: Dateien committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch .nojekyll
          git add .nojekyll index.html regions/ jobs/ jobs.json events.html README.md
          git diff --staged --quiet || git commit -m "Update jobs + events $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
